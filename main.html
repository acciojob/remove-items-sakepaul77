<!DOCTYPE html>
<html>
<head>
    <title>Remove Color from Dropdown</title>
</head>
<body>

    <select id="colorSelect">
        <option>Red</option>
        <option>Green</option>
        <option>White</option>
        <option>Black</option>
    </select>

    <input type="button" value="Select and Remove" onclick="removeColor()">

    <script>
        function removeColor() {
            var select = document.getElementById("colorSelect");
            select.remove(select.selectedIndex);
        }
    </script>

</body>
</html>
